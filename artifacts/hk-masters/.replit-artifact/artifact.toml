kind = "web"
previewPath = "/"
title = "HK 2026 Masters World Cup"
version = "1.0.0"
id = "artifacts/hk-masters"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20336
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hk-masters run dev"

[services.env]
PORT = "20336"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hk-masters", "run", "build"]
publicDir = "artifacts/hk-masters/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
