kind = "web"
previewPath = "/hk-masters-web/"
title = "HK Masters Hockey - Public Website"
version = "1.0.0"
id = "artifacts/hk-masters-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hk-masters-web/" ]
localPort = 22203

[services.development]
run = "pnpm --filter @workspace/hk-masters-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hk-masters-web", "run", "build" ]
publicDir = "artifacts/hk-masters-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22203"
BASE_PATH = "/hk-masters-web/"
