[build]
  base    = "."
  command = "corepack enable && pnpm install && pnpm --filter @workspace/hk-masters-web run build"
  publish = "artifacts/hk-masters-web/dist"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
